<html>
<head>
<title>Div Formatting</title>
<style>
.narrow-text-area {
  text-align: center;
  border: 5px solid orange;
}

.text-box {
  background-color: cyan;
  padding: 5px;
  margin: 10px 20px;
}
</style>
</head>
<body>

<div class="narrow-text-area">
Lorem ipsum dolor sit amet, ut quam nihil hic corporis quae qui voluptate pariatur et odio nemo.
</div>

<div class="text-box">
Lorem ipsum dolor sit amet, ut quam nihil hic corporis quae qui voluptate pariatur et odio nemo. Et nihil nihil in sapiente, nam magnaam hic dolorum ree ea unde dolor ut numquam autem.
</div>

</body>
</html>
